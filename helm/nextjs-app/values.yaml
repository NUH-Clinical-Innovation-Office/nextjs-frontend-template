# Default values for nextjs-app
replicaCount: 2

image:
  repository: nextjs-frontend-template
  pullPolicy: IfNotPresent
  tag: "latest"

imagePullSecrets:
  - name: ghcr-secret

nameOverride: ""
fullnameOverride: ""

# Common labels for cost allocation and resource organization
commonLabels: {}
  # team: "frontend-team"
  # project: "nextjs-frontend-template"
  # cost-center: "engineering"
  # environment: "production"

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1001
  fsGroup: 1001

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
    - ALL
  readOnlyRootFilesystem: true

service:
  type: NodePort
  port: 3000
  targetPort: 3000

ingress:
  enabled: false
  className: "nginx"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    # nginx.ingress.kubernetes.io/ssl-redirect: "true"
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: nextjs-app-tls
      hosts:
        - chart-example.local

resources:
  limits:
    cpu: 500m
    memory: 256Mi
  requests:
    cpu: 250m
    memory: 256Mi

# Node.js runtime tuning.
# Node has no JVM-style heap flag; cap the V8 old-space via NODE_OPTIONS so the
# heap stays well under the container memory limit (avoids OOMKills before GC
# kicks in). Set to ~75% of resources.limits.memory.
# Default kept at 192 MiB so it never exceeds a real environment (production runs
# a 256Mi limit -> 192). Override per-environment to track that environment's
# memory limit; environments with more memory can raise this.
nodeOptions:
  maxOldSpaceSizeMiB: 192

# Prometheus metrics exposure.
# App serves metrics on a dedicated port (not via ingress). Discovery is via a
# ServiceMonitor (Prometheus Operator / kube-prometheus-stack).
metrics:
  enabled: true
  port: 9464
  path: /metrics
  serviceMonitor:
    enabled: true
    namespace: ""          # empty -> chart release namespace
    interval: 30s
    scrapeTimeout: 10s
    labels: {}             # extra labels if Prometheus needs a selector match

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 4
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity: {}

# Environment variables
env: []
  # - name: API_URL
  #   value: "https://api.example.com"
  # - name: NODE_ENV
  #   value: "production"

# Environment variables from secrets/configmaps
envFrom: []
  # - secretRef:
  #     name: nextjs-secrets
  # - configMapRef:
  #     name: nextjs-config

# Liveness probe configuration
livenessProbe:
  httpGet:
    path: /
    port: 3000
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

# Readiness probe configuration
readinessProbe:
  httpGet:
    path: /
    port: 3000
  initialDelaySeconds: 10
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

# Startup probe configuration (useful for slow-starting apps)
startupProbe:
  httpGet:
    path: /
    port: 3000
  initialDelaySeconds: 0
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 30

# Pod Disruption Budget configuration
podDisruptionBudget:
  enabled: false

# Feature branch configuration
featureBranch:
  enabled: false
  portMappingNamespace: "default"
